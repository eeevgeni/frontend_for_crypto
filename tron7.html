<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trust Wallet TRON Connect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 30px;
    }
    button {
      padding: 14px 20px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    .box {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h2>Подключение Trust Wallet / TRON</h2>

  <button id="connectBtn">Подключить кошелёк</button>

  <div class="box">
    <div><b>Статус:</b> <span id="status">Не подключен</span></div>
    <div><b>TRON адрес:</b> <span id="address">—</span></div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const addressEl = document.getElementById("address");
    const connectBtn = document.getElementById("connectBtn");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function connectTrustWalletTron() {
      try {
        setStatus("Проверяем TRON provider...");

        // Trust Wallet / TronLink обычно инжектят tronWeb в браузер dApp
        if (!window.tronWeb) {
          setStatus("TRON provider не найден. Открой страницу внутри браузера Trust Wallet.");
          return;
        }

        // Небольшая задержка, чтобы кошелёк успел инициализироваться
        await new Promise(resolve => setTimeout(resolve, 800));

        const tronWeb = window.tronWeb;

        if (!tronWeb.defaultAddress || !tronWeb.defaultAddress.base58) {
          setStatus("Кошелёк найден, но адрес не получен. Разреши подключение или выбери TRON аккаунт.");
          return;
        }

        const address = tronWeb.defaultAddress.base58;

        addressEl.textContent = address;
        setStatus("Кошелёк подключен");

        console.log("TRON address:", address);
        console.log("tronWeb:", tronWeb);

      } catch (err) {
        console.error(err);
        setStatus("Ошибка подключения: " + err.message);
      }
    }

    connectBtn.addEventListener("click", connectTrustWalletTron);
  </script>

</body>
</html>
